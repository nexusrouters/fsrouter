name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build monorepo
        run: npm run build

      - name: Copy frontend assets to backend
        run: |
          cp -r frontend/dist/* backend/public/
          cp README.md backend/

      - name: Prepare package.json for publishing
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("backend/package.json", "utf8"));
            
            // Rename to @fudrouter/fsrouter and make public
            pkg.name = "@fudrouter/fsrouter";
            pkg.private = false;
            // Publish exactly the pushed tag; prevents stale backend version conflicts.
            pkg.version = process.env.GITHUB_REF_NAME.replace(/^v/, "");
            
            // Map global command to fsrouter
            pkg.bin = {
              "fsrouter": "bin/cli.cjs"
            };
            
            // tsx is needed at runtime for --import tsx (path mapping @/* -> dist/*)
            // @modelcontextprotocol/sdk needed for search route
            // Move essential devDeps to dependencies
            const essentialDevDeps = ["tsx", "@modelcontextprotocol/sdk", "@types/node"];
            essentialDevDeps.forEach(dep => {
              if (pkg.devDependencies?.[dep]) {
                pkg.dependencies = pkg.dependencies || {};
                pkg.dependencies[dep] = pkg.devDependencies[dep];
              }
            });
            delete pkg.devDependencies;
            
            fs.writeFileSync("backend/package.json", JSON.stringify(pkg, null, 2));
            console.log("package.json prepared successfully for publishing.");
          '

      - name: Publish to npm
        run: |
          cd backend
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
